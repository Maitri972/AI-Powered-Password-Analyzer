<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-PWA Admin Login</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/3.11.0/mdb.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        .gradient-custom {
            background: #6a11cb;
            background: -webkit-linear-gradient(to right, rgba(106, 17, 203, 1), rgba(37, 117, 252, 1));
            background: linear-gradient(to right, rgba(106, 17, 203, 1), rgba(37, 117, 252, 1));
        }
        .card {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .fw-bold {
            font-weight: 800 !important;
        }
        .text-uppercase {
            letter-spacing: 2px;
            color: #007bff;
            margin-bottom: 10px !important;
        }
        .form-outline .form-label {
            color: rgba(255, 255, 255, 0.7);
            margin-top: -5px; 
            margin-left: 5px;
        }
        .form-outline .form-control {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .form-outline .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.25rem rgba(0, 123, 255, 0.25);
        }
        .admin-icon {
            font-size: 3em;
            /* The color is set inline below, but this class defines the size */
            margin-bottom: 20px;
        }
        .btn-outline-light:hover {
            background-color: #007bff !important;
            color: white !important;
            border-color: #007bff !important;
        }
    </style>
</head>
<body>

<section class="vh-100 gradient-custom">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-12 col-md-8 col-lg-6 col-xl-5">
        <div class="card bg-dark text-white" style="border-radius: 1rem;">
          
          <div class="card-body p-5 text-center">
            
            <form action="dashboard.html" method="GET">
                <div class="mb-md-5 mt-md-4 pb-5">

                  <i class="fas fa-user-shield admin-icon" style="color: #007bff;"></i>
                  
                  <h2 class="fw-bold mb-2 text-uppercase">Admin Login</h2>
                  <p class="text-white-50 mb-5">Access the AI-PWA Management Dashboard</p>

                  <div class="form-outline form-white mb-4">
                    <input type="email" id="typeEmailX" class="form-control form-control-lg" required/>
                    <label class="form-label" for="typeEmailX">Email</label>
                  </div>

                  <div class="form-outline form-white mb-4">
                    <input type="password" id="typePasswordX" class="form-control form-control-lg" required/>
                    <label class="form-label" for="typePasswordX">Password</label>
                  </div>

                  <p class="small mb-5 pb-lg-2"><a class="text-white-50" href="#!">Forgot password?</a></p>

                  <button class="btn btn-outline-light btn-lg px-5" type="submit">
                      <i class="fas fa-sign-in-alt"></i> Login
                  </button>

                  <div class="d-flex justify-content-center text-center mt-4 pt-1">
                      </div>

                </div>
            </form>

            <div>
                <p class="mb-0 text-white-50">AI-PWA Management System</p>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/3.11.0/mdb.min.js"></script>
</body>
</html>
